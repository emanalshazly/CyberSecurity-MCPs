version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cybersecurity-postgres
    environment:
      POSTGRES_DB: cybersecurity_saas
      POSTGRES_USER: cybersecurity_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - cybersecurity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersecurity_user -d cybersecurity_saas"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cybersecurity-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cybersecurity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Enhanced Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersecurity-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://cybersecurity_user:${POSTGRES_PASSWORD:-secure_password_123}@postgres:5432/cybersecurity_saas
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cybersecurity-network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Enhanced Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybersecurity-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_APP_NAME: "Cybersecurity SaaS Platform"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cybersecurity-network
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Enhanced SQLMap MCP Server
  sqlmap-mcp:
    build:
      context: ./implementations/sqlmap-mcp
      dockerfile: Dockerfile
    container_name: cybersecurity-sqlmap-mcp
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MCP_SERVER_NAME: sqlmap-server
      MCP_SERVER_VERSION: 1.0.0
      SQLMAP_PATH: /usr/local/bin/sqlmap
    volumes:
      - ./implementations/sqlmap-mcp:/app
      - /app/node_modules
      - sqlmap_data:/app/data
    networks:
      - cybersecurity-network
    restart: unless-stopped
    depends_on:
      - backend

  # Enhanced Quake MCP Server
  quake-mcp:
    build:
      context: ./implementations/quake-server
      dockerfile: Dockerfile
    container_name: cybersecurity-quake-mcp
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MCP_SERVER_NAME: quake-server
      MCP_SERVER_VERSION: 1.0.0
      QUAKE_API_KEY: ${QUAKE_API_KEY}
      QUAKE_API_URL: ${QUAKE_API_URL:-https://quake.360.net/api/v3}
    volumes:
      - ./implementations/quake-server:/app
      - /app/node_modules
      - quake_data:/app/data
    networks:
      - cybersecurity-network
    restart: unless-stopped
    depends_on:
      - backend

  # Enhanced Document Processor MCP Server
  doc-processor-mcp:
    build:
      context: ./implementations/doc-processor
      dockerfile: Dockerfile
    container_name: cybersecurity-doc-processor-mcp
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MCP_SERVER_NAME: doc-processor
      MCP_SERVER_VERSION: 1.0.0
      LIBREOFFICE_PATH: /usr/bin/libreoffice
      PANDOC_PATH: /usr/bin/pandoc
    volumes:
      - ./implementations/doc-processor:/app
      - /app/node_modules
      - doc_processor_data:/app/data
    networks:
      - cybersecurity-network
    restart: unless-stopped
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cybersecurity-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: cybersecurity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: cybersecurity-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Elasticsearch for Log Aggregation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cybersecurity-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: cybersecurity-kibana
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Filebeat for Log Collection
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: cybersecurity-filebeat
    user: root
    volumes:
      - ./monitoring/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cybersecurity-network
    restart: unless-stopped
    depends_on:
      - elasticsearch

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  sqlmap_data:
    driver: local
  quake_data:
    driver: local
  doc_processor_data:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  cybersecurity-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16